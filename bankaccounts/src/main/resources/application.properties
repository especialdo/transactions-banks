spring.application.name=bankaccounts

server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/bankaccounts_db
spring.datasource.username=admin
spring.datasource.password=admin123

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=true



# Kafka bootstrap
spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.value.default.type=com.transactions.bankaccounts.infraestructure.adapter.in.kafka.ClienteTopic
spring.kafka.admin.auto-create=true

spring.kafka.consumer.properties.spring.json.use.type.headers=false




